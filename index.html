<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI文案助手 - 职场+社交媒体</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto}
body{background:#f5f7fa;padding:20px}
.container{max-width:700px;margin:0 auto}
.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:20px}
h1{font-size:22px;margin-bottom:20px;text-align:center;color:#1d2129}
.item{margin-bottom:16px}
label{display:block;margin-bottom:8px;font-size:14px;color:#4e5969}
select,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #e5e6eb;font-size:15px}
textarea{min-height:110px;resize:vertical}
button{padding:12px 16px;background:#0066ff;color:white;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;margin-right:8px}
button:disabled{background:#94c2ff}
.btn-small{padding:8px 12px;font-size:13px;background:#f0f2f5;color:#4e5969}
.result{background:#f7f8fa;padding:18px;border-radius:12px;white-space:pre-wrap;line-height:1.7;margin-top:20px;font-size:15px}
.tip{font-size:12px;color:#86909c;text-align:center;margin-top:10px}
.btn-group{display:flex;align-items:center;margin-top:8px}
.download-btn{margin-top:12px;background:#00cc66}
.download-btn:disabled{background:#99e6b3}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>AI文案助手 - 职场+社交媒体</h1>
    <div class="item">
      <label>文案类型</label>
      <select id="type">
        <!-- 职场文书 -->
        <option value="工作总结">工作总结</option>
        <option value="工作计划">工作计划</option>
        <option value="转正申请">转正申请</option>
        <option value="离职申请">离职申请</option>
        <option value="请假条">请假条</option>
        <option value="通知公告">通知公告</option>
        <option value="会议纪要">会议纪要</option>
        <option value="致歉信/情况说明">致歉信/情况说明</option>
        <option value="检讨书">检讨书</option>
        <option value="感谢信">感谢信</option>
        <option value="述职报告">述职报告</option>
        <option value="出差申请">出差申请</option>
        <option value="加班申请">加班申请</option>
        <option value="调岗申请">调岗申请</option>
        <option value="团建活动方案">团建活动方案</option>
        <option value="活动策划">活动策划</option>
        <option value="申请经费">申请经费</option>
        <option value="推荐信">推荐信</option>
        <option value="入职自我介绍">入职自我介绍</option>
        <option value="简报/汇报材料">简报/汇报材料</option>
        <!-- 新增社交媒体文案 -->
        <option value="小红书文案">小红书文案</option>
        <option value="朋友圈文案">朋友圈文案</option>
        <option value="知乎文案">知乎文案</option>
        <option value="微博文案">微博文案</option>
      </select>
    </div>
    <div class="item">
      <label>风格</label>
      <select id="style">
        <option value="正式">正式</option>
        <option value="简洁">简洁</option>
        <option value="诚恳">诚恳</option>
        <option value="活泼">活泼</option>
        <option value="走心">走心</option>
        <option value="专业">专业</option>
      </select>
    </div>
    <div class="item">
      <label>字数</label>
      <select id="len">
        <option value="100">100字</option>
        <option value="200">200字</option>
        <option value="300" selected>300字</option>
        <option value="500">500字</option>
      </select>
    </div>
    <div class="item">
      <label>背景信息</label>
      <textarea id="content" placeholder="例如：小红书文案-平价防晒霜，混油皮适用，轻薄不闷痘..."></textarea>
      <div class="btn-group">
        <button class="btn-small" onclick="fillExample()">参考样例</button>
      </div>
    </div>
    <button onclick="gen()" id="btn">一键生成</button>
    <button class="download-btn" id="downloadBtn" onclick="downloadDoc()" disabled style="display:none">下载文档</button>
    <div class="tip">免费使用，每日有限次数</div>
  </div>
  <div id="result" style="display:none" class="result"></div>
</div>

<script>
let currentDocId = "";

// 填充参考样例
async function fillExample(){
  const type = document.getElementById('type').value;
  const contentEl = document.getElementById('content');
  contentEl.placeholder = "加载样例中...";
  
  try{
    const res = await fetch(`/api/examples/${encodeURIComponent(type)}`);
    const data = await res.json();
    contentEl.value = data.example || "暂无参考样例";
  }catch(e){
    contentEl.placeholder = "样例加载失败，请手动输入";
  }
}

// 生成文案
async function gen(){
  const btn = document.getElementById('btn')
  const downloadBtn = document.getElementById('downloadBtn')
  const res = document.getElementById('result')
  const type = document.getElementById('type').value
  const style = document.getElementById('style').value
  const len = document.getElementById('len').value
  const content = document.getElementById('content').value.trim()

  if(!content){alert('请填写内容');return}
  btn.disabled = true
  downloadBtn.disabled = true
  downloadBtn.style.display = 'none'
  btn.textContent = '生成中...'
  res.style.display = 'block'
  res.textContent = '正在生成，请稍候...'

  try{
    const r = await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type,style,len,content})
    })
    const data = await r.json()
    res.textContent = data.result || '生成失败'
    
    if(data.doc_id && !data.result.startsWith('❌')){
      currentDocId = data.doc_id;
      downloadBtn.disabled = false;
      downloadBtn.style.display = 'inline-block';
    }
  }catch(e){
    res.textContent = '请求错误，正在重试...';
    setTimeout(() => gen(), 1000);
  }finally{
    btn.disabled = false
    btn.textContent = '一键生成'
  }
}

// 下载文档
function downloadDoc(){
  if(!currentDocId){
    alert('暂无可下载的文档');
    return;
  }
  window.open(`/api/download/${currentDocId}`, '_blank');
}
</script>
</body>
</html>
