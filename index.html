<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI文案助手 - 职场+社交媒体</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto}
body{background:#f5f7fa;padding:20px}
.container{max-width:700px;margin:0 auto}
.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:20px}
h1{font-size:22px;margin-bottom:20px;text-align:center;color:#1d2129}
.item{margin-bottom:16px}
label{display:block;margin-bottom:8px;font-size:14px;color:#4e5969}
select,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #e5e6eb;font-size:15px}
textarea{min-height:110px;resize:vertical}
button{padding:12px 16px;background:#0066ff;color:white;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;margin-right:8px}
button:disabled{background:#94c2ff;cursor:not-allowed}
.btn-small{padding:8px 12px;font-size:13px;background:#f0f2f5;color:#4e5969}
.result{background:#f7f8fa;padding:18px;border-radius:12px;white-space:pre-wrap;line-height:1.7;margin-top:20px;font-size:15px}
.result.error{color:#f53f3f;background:#fff1f0;border:1px solid #ffccc7}
.tip{font-size:12px;color:#86909c;text-align:center;margin-top:10px}
.btn-group{display:flex;align-items:center;margin-top:8px}
.download-btn{margin-top:12px;background:#00cc66}
.download-btn:disabled{background:#99e6b3;cursor:not-allowed}
.loading {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #fff;
  border-radius: 50%;
  border-top-color: transparent;
  animation: spin 1s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>AI文案助手 - 职场+社交媒体</h1>
    <div class="item">
      <label>文案类型</label>
      <select id="type">
        <option value="工作总结">工作总结</option>
        <option value="工作计划">工作计划</option>
        <option value="转正申请">转正申请</option>
        <option value="离职申请">离职申请</option>
        <option value="请假条">请假条</option>
        <option value="通知公告">通知公告</option>
        <option value="会议纪要">会议纪要</option>
        <option value="致歉信/情况说明">致歉信/情况说明</option>
        <option value="检讨书">检讨书</option>
        <option value="感谢信">感谢信</option>
        <option value="述职报告">述职报告</option>
        <option value="出差申请">出差申请</option>
        <option value="加班申请">加班申请</option>
        <option value="调岗申请">调岗申请</option>
        <option value="团建活动方案">团建活动方案</option>
        <option value="活动策划">活动策划</option>
        <option value="申请经费">申请经费</option>
        <option value="推荐信">推荐信</option>
        <option value="入职自我介绍">入职自我介绍</option>
        <option value="简报/汇报材料">简报/汇报材料</option>
        <option value="小红书文案">小红书文案</option>
        <option value="朋友圈文案">朋友圈文案</option>
        <option value="知乎文案">知乎文案</option>
        <option value="微博文案">微博文案</option>
      </select>
    </div>
    <div class="item">
      <label>风格</label>
      <select id="style">
        <option value="正式">正式</option>
        <option value="简洁">简洁</option>
        <option value="诚恳">诚恳</option>
        <option value="活泼">活泼</option>
        <option value="走心">走心</option>
        <option value="专业">专业</option>
      </select>
    </div>
    <div class="item">
      <label>字数</label>
      <select id="len">
        <option value="100">100字</option>
        <option value="200">200字</option>
        <option value="300" selected>300字</option>
        <option value="500">500字</option>
      </select>
    </div>
    <div class="item">
      <label>背景信息</label>
      <textarea id="content" placeholder="例如：小红书文案-平价防晒霜，混油皮适用，轻薄不闷痘..."></textarea>
      <div class="btn-group">
        <button class="btn-small" onclick="fillExample()">参考样例</button>
      </div>
    </div>
    <button onclick="gen()" id="btn">一键生成</button>
    <button class="download-btn" id="downloadBtn" onclick="downloadDoc()" disabled style="display:none">下载文档</button>
    <div class="tip">免费使用，每日有限次数 | 如遇错误请检查网络或稍后重试</div>
  </div>
  <div id="result" style="display:none" class="result"></div>
</div>

<script>
let currentDocId = "";
let isGenerating = false; // 防止重复点击
const MAX_RETRY = 1; // 仅重试1次，避免无限循环
let retryCount = 0;

// 填充参考样例
async function fillExample(){
  const type = document.getElementById('type').value;
  const contentEl = document.getElementById('content');
  const originalPlaceholder = contentEl.placeholder;
  
  contentEl.placeholder = "加载样例中...";
  
  try{
    // 5秒超时控制
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 5000);
    
    const res = await fetch(`/api/examples/${encodeURIComponent(type)}`, {
      signal: controller.signal
    });
    
    if(!res.ok) throw new Error(`样例接口错误: ${res.status}`);
    const data = await res.json();
    contentEl.value = data.example || "暂无参考样例";
  }catch(e){
    console.error("样例加载失败:", e);
    contentEl.placeholder = originalPlaceholder;
    contentEl.value = "";
    alert("参考样例加载失败，请手动输入背景信息");
  }
}

// 生成文案
async function gen(){
  // 防止重复点击
  if(isGenerating) return;
  
  const btn = document.getElementById('btn');
  const downloadBtn = document.getElementById('downloadBtn');
  const resEl = document.getElementById('result');
  const type = document.getElementById('type').value;
  const style = document.getElementById('style').value;
  const len = document.getElementById('len').value;
  const content = document.getElementById('content').value.trim();

  if(!content){
    alert('请填写背景信息，以便生成更贴合需求的文案');
    return;
  }

  // 初始化状态
  isGenerating = true;
  retryCount = 0;
  btn.disabled = true;
  downloadBtn.disabled = true;
  downloadBtn.style.display = 'none';
  btn.innerHTML = '<span class="loading"></span>生成中...';
  resEl.style.display = 'block';
  resEl.className = 'result'; // 重置错误样式
  resEl.textContent = '正在生成，请稍候...';

  // 核心请求逻辑（抽离为函数，方便重试）
  async function requestGenerate() {
    try{
      const controller = new AbortController();
      setTimeout(() => controller.abort(), 8000); // 8秒超时
      
      const r = await fetch('/api/generate',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        signal: controller.signal,
        body:JSON.stringify({type,style,len,content})
      });

      // 处理HTTP错误（非200状态码）
      if(!r.ok) throw new Error(`服务器错误 [${r.status}]：${r.statusText}`);
      
      const data = await r.json();
      resEl.textContent = data.result || '生成失败：未返回有效内容';
      
      // 标记后端返回的错误
      if(data.result && data.result.startsWith('❌')){
        resEl.className = 'result error';
      }
      
      // 处理下载按钮
      if(data.doc_id && !data.result.startsWith('❌')){
        currentDocId = data.doc_id;
        downloadBtn.disabled = false;
        downloadBtn.style.display = 'inline-block';
      }
      
      return true; // 请求成功
    }catch(e){
      retryCount++;
      console.error("生成请求失败:", e);
      
      // 重试逻辑（仅1次）
      if(retryCount <= MAX_RETRY){
        resEl.textContent = `请求失败（${retryCount}/${MAX_RETRY}），正在重试...`;
        resEl.className = 'result error';
        setTimeout(() => requestGenerate(), 1500); // 1.5秒后重试
        return false;
      }else{
        // 最终失败提示
        resEl.textContent = `生成失败：${e.message || '服务器内部错误'}\n请检查后端API或稍后重试`;
        resEl.className = 'result error';
        return false;
      }
    }finally{
      // 恢复按钮状态（仅当重试完成/无重试时）
      if(retryCount >= MAX_RETRY){
        btn.disabled = false;
        btn.innerHTML = '一键生成';
        isGenerating = false;
      }
    }
  }

  // 执行请求
  await requestGenerate();
}

// 下载文档
function downloadDoc(){
  if(!currentDocId){
    alert('暂无可下载的文档');
    return;
  }
  // 增加下载错误提示
  const link = document.createElement('a');
  link.href = `/api/download/${currentDocId}`;
  link.target = '_blank';
  link.addEventListener('error', () => alert('下载失败：服务器无响应，请稍后重试'));
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>
</body>
</html>
